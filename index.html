<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilder-Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto max-w-7xl px-4 py-4">
        <h1 class="text-2xl font-bold tracking-tight">Bilder-Tool</h1>
        <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-4">
          <label class="text-sm font-medium text-slate-700">
            Zielordner
            <div class="mt-1 flex gap-2">
              <button id="pickFolderBtn" type="button" class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700">Ordner wählen</button>
              <input id="folderFallbackInput" type="text" placeholder="Fallback Pfad" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
            </div>
          </label>

          <label class="text-sm font-medium text-slate-700">
            Standort
            <select id="standortSelect" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></select>
          </label>

          <label class="text-sm font-medium text-slate-700">
            Aufnahmedatum
            <input id="dateInput" type="date" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </label>

          <label class="text-sm font-medium text-slate-700">
            Kommentar (optional)
            <input id="commentInput" type="text" placeholder="z. B. Nordseite" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </label>
        </div>
      </div>
    </header>

    <main class="mx-auto grid max-w-7xl grid-cols-1 gap-4 p-4 lg:grid-cols-3">
      <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm lg:col-span-2">
        <h2 class="text-lg font-semibold">Bildbereiche</h2>
        <p class="mt-1 text-sm text-slate-500">Datei auf Element ziehen oder Element anklicken.</p>
        <svg viewBox="0 0 700 480" class="mt-4 w-full rounded-xl border border-slate-200 bg-slate-50" aria-label="Standortgrafik">
          <rect x="10" y="10" width="680" height="460" class="zone fill-blue-50 stroke-blue-600" data-zone="Grundstück" tabindex="0" />
          <rect x="40" y="390" width="220" height="60" class="zone fill-cyan-100 stroke-cyan-700" data-zone="Zufahrt" tabindex="0" />
          <text x="65" y="425">Zufahrt</text>
          <rect x="520" y="330" width="140" height="90" class="zone fill-emerald-100 stroke-emerald-700" data-zone="Kabine" tabindex="0" />
          <text x="555" y="380">Kabine</text>
          <rect x="320" y="130" width="35" height="240" class="zone fill-orange-100 stroke-orange-700" data-zone="Mast" tabindex="0" />
          <line x1="337" y1="130" x2="337" y2="370" class="zone stroke-orange-700" data-zone="Mast" tabindex="0" />
          <text x="282" y="115">Mast / Steigleiter</text>
          <line x1="337" y1="165" x2="520" y2="355" class="zone stroke-orange-700" data-zone="Mast" tabindex="0" />
          <line x1="337" y1="200" x2="180" y2="410" class="zone stroke-orange-700" data-zone="Mast" tabindex="0" />
          <rect x="90" y="300" width="150" height="70" class="zone fill-violet-100 stroke-violet-700" data-zone="Energietechnik" tabindex="0" />
          <text x="96" y="340">ZAS Energietechnik</text>
          <text x="22" y="32">Grundstück / Zaun</text>
        </svg>
        <input id="hiddenFileInput" type="file" accept="image/jpeg,image/jpg" multiple hidden />
      </section>

      <aside class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-lg font-semibold">Dateiliste</h2>
        <ul id="fileList" class="mt-3 space-y-2"></ul>
      </aside>
    </main>

    <template id="fileItemTemplate">
      <li class="relative rounded-xl border border-slate-200 bg-slate-50 p-3">
        <button type="button" class="delete absolute right-2 top-2 text-red-600 hover:text-red-700" title="Eintrag löschen">✕</button>
        <p class="path pr-6 text-xs text-slate-500"></p>
        <p class="mt-1 text-[11px] text-slate-400">Dateiname (direkt anklickbar):</p>
        <p class="editable-name mt-1 rounded-md border border-dashed border-slate-300 bg-white px-2 py-1 text-sm font-medium" contenteditable="true"></p>
        <p class="old-name mt-1 text-xs text-slate-400"></p>
      </li>
    </template>

    <script src="standorte.js"></script>
    <script src="app.js"></script>
  </body>
</html>
